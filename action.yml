name: "Pull Request Fixed Header"
description: "Keep a custom message on the top of your PR description"
author: "kyranjamie"
inputs:
  header:
    description: "Markdown message you want to stick at the top of your PR"
    required: true
  pr-number:
    description: "PR number to update. Defaults to github.event.pull_request.number when running on a pull_request event."
    required: false
  destination_branch:
    description: "Base branch of the PR. Default is master"
    default: "master"
    required: false
  GITHUB_TOKEN:
    description: "set secrets.GITHUB_TOKEN here"
    required: true
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  icon: "git-pull-request"
  color: "yellow"
